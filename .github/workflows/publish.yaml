name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          version: latest

      - name: Setup pnpm and install dependencies
        uses: pnpm/action-setup@v4
        with:
          version: latest
          cache: true
          run_install: true

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
