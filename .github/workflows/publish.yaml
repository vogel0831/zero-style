name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          version: latest

      - name: Setup pnpm and install dependencies
        uses: pnpm/action-setup@v4
        with:
          version: latest
          cache: true
          run_install: true

      - name: Build
        run: pnpm run build

      - name: Publish
        run: pnpm publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
